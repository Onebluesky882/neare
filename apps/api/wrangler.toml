name = "YOUR_APP_NAME-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FROM_EMAIL = "noreply@yourdomain.com"
OWNER_EMAIL = ""
ALLOWED_ORIGINS = "https://YOUR_APP_NAME-web.YOUR_ACCOUNT.workers.dev,https://YOUR_APP_NAME-admin.YOUR_ACCOUNT.workers.dev"
R2_ACCOUNT_ID = ""
R2_BUCKET_NAME = ""
GITHUB_REPO_OWNER = ""
GITHUB_TEMPLATE_REPO = ""
# Secrets — set via: wrangler secret put <NAME>
# RESEND_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_WEBHOOK_SECRET
# GITHUB_TOKEN
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# ANTHROPIC_API_KEY          ← your Anthropic API key
# ANTHROPIC_AGENT_ID         ← output from: npx tsx scripts/setup-anthropic-agent.ts
# ANTHROPIC_ENV_ID           ← output from: npx tsx scripts/setup-anthropic-agent.ts
# DEPLOY_WEBHOOK_SECRET      ← random secret shared with GitHub Actions
# SITE_URL                   ← client's live website URL e.g. https://client-web.workers.dev
# BOT_TOKEN                  ← from @BotFather on Telegram
# TELEGRAM_SECRET_TOKEN      ← random string you set when registering webhook (openssl rand -hex 16)
# DISCORD_PUBLIC_KEY         ← from your app's page in the Discord Developer Portal
# DISCORD_BOT_TOKEN          ← from the Bot tab of your app in the Discord Developer Portal
# NOWPAYMENTS_API_KEY        ← from your NOWPayments account dashboard
# NOWPAYMENTS_IPN_SECRET     ← from your NOWPayments account's IPN settings

[[r2_buckets]]
binding = "BUCKET"
bucket_name = ""

[[d1_databases]]
binding = "DB"
database_name = ""
database_id = ""
